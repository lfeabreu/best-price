<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Melhor Preço</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://kit.fontawesome.com/f565fa176c.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="loader-modal" class="loader-modal">
    <div class="loader"></div>
  </div>
  <h1>Melhor Preço</h1>

  <div class="search-bar">
    <label for="termo-codigo">Termo / Código de Barras</label>
    <input type="text" id="termo-codigo" placeholder="Digite o termo ou código de barras" />
    <button id="btn-scanner" title="Escanear código de barras" class="btn"><i class="fa-solid fa-barcode"></i></button>
    <button id="btn-buscar" class="btn">Buscar</button>
  </div>

  <div id="resultado">O resultado aparecerá aqui.</div>

  <!-- Scanner Modal -->
  <div id="scanner-modal" class="scanner-modal">
    <div class="scanner-modal-content">
      <div class="scanner-modal-header">
        <h2>Escanear Código de Barras</h2>
        <button class="scanner-close" id="scanner-close">✕</button>
      </div>
      <div id="qr-reader"></div>
      <div class="scanner-status" id="scanner-status"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
